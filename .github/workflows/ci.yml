name: IaC CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6
      - run: terraform -chdir=terraform/azure/storage-account init -backend=false
      - run: terraform -chdir=terraform/azure/storage-account validate
  bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: az bicep build --file bicep/azure/storage-account/main.bicep
        continue-on-error: true  # if az not installed in runner
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true
